# GoReleaser configuration for 2ndbrain
# Documentation: https://goreleaser.com

# yaml-language-server: $schema=https://goreleaser.com/static/schema.json
# vim: set ts=2 sw=2 tw=0 fo=cnqoj

version: 2

project_name: 2nb

before:
  hooks:
    - cd cli && go mod tidy
    - cd cli && go test -short ./...

builds:
  - id: 2nb
    dir: ./cli
    main: ./cmd/2nb
    binary: 2nb

    ldflags:
      - -s -w
      - -X github.com/apresai/2ndbrain/internal/cli.Version={{.Version}}

    # Pure-Go SQLite (modernc.org/sqlite): no CGO, no fts5 build tag. Both
    # macOS arches build from a single runner with no C toolchain — this is
    # what makes the x86_64 build actually produce x86_64 (the prior CGO setup
    # silently emitted an arm64 binary for the amd64 target).
    goos:
      - darwin

    goarch:
      - amd64
      - arm64

    env:
      - CGO_ENABLED=0

archives:
  - id: 2nb
    name_template: >-
      {{ .ProjectName }}_
      {{- .Version }}_
      {{- title .Os }}_
      {{- if eq .Arch "amd64" }}x86_64
      {{- else }}{{ .Arch }}{{ end }}

    files:
      - README.md
      - LICENSE*
      - CHANGELOG.md

checksum:
  name_template: 'checksums.txt'
  algorithm: sha256

snapshot:
  version_template: "{{ incpatch .Version }}-next"

changelog:
  sort: asc
  use: github
  filters:
    exclude:
      - '^docs:'
      - '^test:'
      - '^chore:'
      - '^ci:'
  groups:
    - title: Features
      regexp: '^.*?feat(\([[:word:]]+\))??!?:.+$'
      order: 0
    - title: 'Bug Fixes'
      regexp: '^.*?fix(\([[:word:]]+\))??!?:.+$'
      order: 1
    - title: Others
      order: 999

release:
  github:
    owner: apresai
    name: 2ndbrain

  header: |
    ## 2nb {{ .Version }}

    AI-native markdown knowledge base with semantic search and RAG, plus the **SecondBrain** macOS companion app and the Obsidian plugin.

    ### Installation

    **macOS app + CLI (Homebrew cask):**
    ```bash
    brew install --cask apresai/tap/secondbrain   # installs SecondBrain.app and the 2nb CLI
    ```

    **CLI only (Homebrew):**
    ```bash
    brew install apresai/tap/2nb
    ```

    **macOS app (direct download):**
    Download `SecondBrain-{{ .Version }}-arm64.dmg` below, open it, and drag **SecondBrain** onto **Applications**. The app and its disk image are both Developer ID-signed, Apple-notarized, and stapled, so it launches with no Gatekeeper prompt.

    **CLI (direct download):**
    ```bash
    tar -xzf 2nb_{{ .Version }}_Darwin_arm64.tar.gz
    sudo mv 2nb /usr/local/bin/
    ```

    **Obsidian plugin:** install via [BRAT](https://github.com/TfTHacker/obsidian42-brat) (add `apresai/2ndbrain`), or copy `manifest.json`, `main.js`, and `styles.css` from the assets below into `<vault>/.obsidian/plugins/obsidian-2ndbrain/`.

  footer: |
    ### Getting Started

    ```bash
    # Create a vault
    2nb vault create ~/my-vault

    # Index documents for search
    2nb index

    # Search your knowledge base
    2nb search "authentication patterns"

    # Set up local AI (optional)
    2nb ai setup
    ```

    For documentation: https://github.com/apresai/2ndbrain

    **Full Changelog**: https://github.com/apresai/2ndbrain/compare/{{ .PreviousTag }}...{{ .Tag }}

  prerelease: auto
  name_template: "v{{.Version}}"

brews:
  - ids:
      - 2nb

    name: twonb

    repository:
      owner: apresai
      name: homebrew-tap
      token: "{{ .Env.HOMEBREW_TAP_TOKEN }}"

    commit_msg_template: "Brew formula update for {{ .ProjectName }} version {{ .Version }}"

    homepage: "https://github.com/apresai/2ndbrain"
    description: "AI-native markdown knowledge base with semantic search, RAG, and MCP server"
    license: "MIT"

    install: |
      bin.install "2nb"

      # Generate and install shell completions so tab-complete
      # and dynamic value suggestions work out of the box for
      # Homebrew users.
      generate_completions_from_executable(bin/"2nb", "completion")

    test: |
      system "#{bin}/2nb", "--help"

    caveats: |
      To get started:

        # Initialize a new vault
        2nb vault create ~/my-vault

        # Or open an existing Obsidian vault
        2nb import-obsidian ~/my-obsidian-vault

        # Set up local AI with Ollama
        2nb ai setup

      Shell completions are installed automatically. Restart your shell
      (or `source ~/.zshrc`) to pick them up.

      For full documentation:
      https://github.com/apresai/2ndbrain
