name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: macos-latest  # CGO (SQLite) + Swift require macOS toolchain
    environment: apresai    # Access HOMEBREW_TAP_TOKEN from this environment
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.24'

      - name: Read version
        run: |
          VERSION=$(cat VERSION | tr -d '\n')
          echo "VERSION=${VERSION}" >> $GITHUB_ENV

      - name: Run GoReleaser
        uses: goreleaser/goreleaser-action@v6
        with:
          distribution: goreleaser
          version: latest
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          HOMEBREW_TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}

      - name: Build SecondBrain.app
        run: |
          # Generate Version.swift
          echo '// Auto-generated from VERSION file — do not edit manually.' > app/Sources/SecondBrain/Version.swift
          echo "let appVersion = \"${VERSION}\"" >> app/Sources/SecondBrain/Version.swift

          # Build release binary
          cd app && swift build -c release
          cd ..

          # Assemble .app bundle
          BUNDLE="app/.build/arm64-apple-macosx/release/SecondBrain.app"
          mkdir -p "${BUNDLE}/Contents/MacOS"
          mkdir -p "${BUNDLE}/Contents/Resources"
          cp -f "app/.build/arm64-apple-macosx/release/SecondBrain" "${BUNDLE}/Contents/MacOS/SecondBrain"
          cp -f "app/Resources/AppIcon.icns" "${BUNDLE}/Contents/Resources/AppIcon.icns"

          # Write Info.plist
          cat > "${BUNDLE}/Contents/Info.plist" << PLIST
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>CFBundleExecutable</key><string>SecondBrain</string>
            <key>CFBundleIdentifier</key><string>dev.apresai.2ndbrain</string>
            <key>CFBundleName</key><string>SecondBrain</string>
            <key>CFBundlePackageType</key><string>APPL</string>
            <key>CFBundleShortVersionString</key><string>${VERSION}</string>
            <key>CFBundleVersion</key><string>${VERSION}</string>
            <key>LSMinimumSystemVersion</key><string>14.0</string>
            <key>NSHighResolutionCapable</key><true/>
            <key>CFBundleIconFile</key><string>AppIcon</string>
          </dict>
          </plist>
          PLIST

          # Ad-hoc codesign
          codesign -s - --deep --force "${BUNDLE}" 2>/dev/null || true

      - name: Package and upload SecondBrain.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          BUNDLE="app/.build/arm64-apple-macosx/release/SecondBrain.app"
          ZIP_NAME="SecondBrain-${VERSION}-arm64.zip"

          # ditto preserves macOS bundle metadata and extended attributes
          ditto -c -k --keepParent "${BUNDLE}" "${ZIP_NAME}"

          # Capture SHA256 for cask template
          SHA256=$(shasum -a 256 "${ZIP_NAME}" | awk '{print $1}')
          echo "APP_SHA256=${SHA256}" >> $GITHUB_ENV

          # Attach to the GitHub Release that GoReleaser created
          gh release upload "v${VERSION}" "${ZIP_NAME}"

      # --- Obsidian plugin (BRAT-installable, no local npm build required) ---
      # Runs AFTER GoReleaser, which owns and creates the GitHub release in its
      # `release:` block. Steps within a job are sequential, so the release
      # `v${VERSION}` already exists by the time we upload here — same proven
      # pattern as the SecondBrain.zip step above. No race with GoReleaser.
      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Build Obsidian plugin
        run: |
          cd plugins/obsidian-2ndbrain
          # legacy-peer-deps is set in .npmrc; package-lock.json is committed.
          npm ci
          # Produces the 3 distributable files: manifest.json, main.js, styles.css
          npm run build

          # Keep versions.json (BRAT/Obsidian compatibility map) in sync with the
          # manifest at release time: merge the current plugin version ->
          # minAppVersion into any committed history so the release asset always
          # reflects what is actually shipping, even if the committed copy lagged.
          node -e "const m=require('./manifest.json');const fs=require('fs');let v={};try{v=require('./versions.json')}catch(e){}v[m.version]=m.minAppVersion;fs.writeFileSync('versions.json', JSON.stringify(v,null,2)+'\n')"

          # Confirm the asset paths the upload step references actually exist.
          ls -l manifest.json main.js styles.css versions.json

      - name: Upload Obsidian plugin assets to release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Run from the workspace root with explicit paths so `gh`'s repo
          # auto-detection is unambiguous. --clobber makes re-runs idempotent
          # (overwrites assets if a previous attempt already uploaded them).
          gh release upload "v${VERSION}" \
            plugins/obsidian-2ndbrain/manifest.json \
            plugins/obsidian-2ndbrain/main.js \
            plugins/obsidian-2ndbrain/styles.css \
            plugins/obsidian-2ndbrain/versions.json \
            --clobber

      - name: Update Homebrew tap
        env:
          HOMEBREW_TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
        run: |
          git clone https://x-access-token:${HOMEBREW_TAP_TOKEN}@github.com/apresai/homebrew-tap.git /tmp/homebrew-tap
          cd /tmp/homebrew-tap

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          # Add 2nb alias for twonb formula (first release only)
          if [ -f twonb.rb ] && [ ! -L Aliases/2nb ]; then
            mkdir -p Aliases
            ln -s ../twonb.rb Aliases/2nb
            git add Aliases/2nb
          fi

          # Generate cask from template
          mkdir -p Casks
          sed \
            -e "s/CASK_VERSION/${VERSION}/g" \
            -e "s/CASK_SHA256/${APP_SHA256}/g" \
            "$GITHUB_WORKSPACE/casks/secondbrain.rb.tmpl" \
            > Casks/secondbrain.rb
          git add Casks/secondbrain.rb

          # Commit and push if there are staged changes
          if ! git diff --cached --quiet; then
            git commit -m "Release v${VERSION}: update formula + cask"
            git push
          fi
