name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: macos-latest  # CGO (SQLite) + Swift require macOS toolchain
    environment: apresai    # Access HOMEBREW_TAP_TOKEN from this environment
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.24'

      - name: Read version
        run: |
          VERSION=$(cat VERSION | tr -d '\n')
          echo "VERSION=${VERSION}" >> $GITHUB_ENV

      - name: Run GoReleaser
        uses: goreleaser/goreleaser-action@v6
        with:
          distribution: goreleaser
          version: latest
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          HOMEBREW_TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}

      # Import the Developer ID Application cert into an ephemeral keychain so
      # the build step below can sign with it. Conditional: if the cert secret
      # isn't set (a fork, or before secrets are configured), fall back to the
      # previous ad-hoc signing and skip notarization — the release still ships,
      # just un-notarized (first-launch right-click required).
      - name: Import signing certificate
        id: codesign_setup
        env:
          DEVID_P12_BASE64: ${{ secrets.MACOS_DEVID_P12_BASE64 }}
          DEVID_P12_PASSWORD: ${{ secrets.MACOS_DEVID_P12_PASSWORD }}
          KEYCHAIN_PASSWORD: ${{ secrets.MACOS_KEYCHAIN_PASSWORD }}
        run: |
          if [ -z "${DEVID_P12_BASE64}" ]; then
            echo "::notice::MACOS_DEVID_P12_BASE64 not set — ad-hoc signing, no notarization."
            echo "signed=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          KEYCHAIN="$RUNNER_TEMP/codesign.keychain-db"
          CERT_PATH="$RUNNER_TEMP/devid.p12"
          echo "${DEVID_P12_BASE64}" | base64 --decode > "${CERT_PATH}"
          security create-keychain -p "${KEYCHAIN_PASSWORD}" "${KEYCHAIN}"
          security set-keychain-settings -lut 21600 "${KEYCHAIN}"
          security unlock-keychain -p "${KEYCHAIN_PASSWORD}" "${KEYCHAIN}"
          security import "${CERT_PATH}" -P "${DEVID_P12_PASSWORD}" -A -t cert -f pkcs12 -k "${KEYCHAIN}"
          # Let codesign use the key non-interactively.
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "${KEYCHAIN_PASSWORD}" "${KEYCHAIN}" >/dev/null
          # Add the temp keychain to the search list (preserving the existing ones).
          security list-keychains -d user -s "${KEYCHAIN}" $(security list-keychains -d user | sed s/\"//g)
          # First Developer ID Application identity's SHA-1. `exit` after the
          # first match avoids a SIGPIPE/pipefail abort and the bare assignment
          # never aborts the step before the explicit empty-check below.
          IDENTITY=$(security find-identity -v -p codesigning "${KEYCHAIN}" | awk '/Developer ID Application/{print $2; exit}')
          if [ -z "${IDENTITY}" ]; then echo "::error::No Developer ID Application identity found in imported keychain"; exit 1; fi
          echo "Signing identity: ${IDENTITY}"
          echo "identity=${IDENTITY}" >> "$GITHUB_OUTPUT"
          echo "keychain=${KEYCHAIN}" >> "$GITHUB_OUTPUT"
          echo "signed=true" >> "$GITHUB_OUTPUT"
          rm -f "${CERT_PATH}"

      - name: Build SecondBrain.app
        run: |
          # Generate Version.swift
          echo '// Auto-generated from VERSION file — do not edit manually.' > app/Sources/SecondBrain/Version.swift
          echo "let appVersion = \"${VERSION}\"" >> app/Sources/SecondBrain/Version.swift

          # Build release binary
          cd app && swift build -c release
          cd ..

          # Assemble .app bundle
          BUNDLE="app/.build/arm64-apple-macosx/release/SecondBrain.app"
          mkdir -p "${BUNDLE}/Contents/MacOS"
          mkdir -p "${BUNDLE}/Contents/Resources"
          cp -f "app/.build/arm64-apple-macosx/release/SecondBrain" "${BUNDLE}/Contents/MacOS/SecondBrain"
          cp -f "app/Resources/AppIcon.icns" "${BUNDLE}/Contents/Resources/AppIcon.icns"

          # Write Info.plist
          cat > "${BUNDLE}/Contents/Info.plist" << PLIST
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>CFBundleExecutable</key><string>SecondBrain</string>
            <key>CFBundleIdentifier</key><string>dev.apresai.2ndbrain</string>
            <key>CFBundleName</key><string>SecondBrain</string>
            <key>CFBundlePackageType</key><string>APPL</string>
            <key>CFBundleShortVersionString</key><string>${VERSION}</string>
            <key>CFBundleVersion</key><string>${VERSION}</string>
            <key>LSMinimumSystemVersion</key><string>14.0</string>
            <key>NSHighResolutionCapable</key><true/>
            <key>CFBundleIconFile</key><string>AppIcon</string>
          </dict>
          </plist>
          PLIST

          # Codesign. With a Developer ID identity available we sign with the
          # hardened runtime + a secure timestamp (both required for
          # notarization); otherwise fall back to the previous ad-hoc signature.
          if [ "${{ steps.codesign_setup.outputs.signed }}" = "true" ]; then
            codesign --force --options runtime --timestamp \
              --keychain "${{ steps.codesign_setup.outputs.keychain }}" \
              --sign "${{ steps.codesign_setup.outputs.identity }}" "${BUNDLE}"
            codesign --verify --strict --verbose=2 "${BUNDLE}"
          else
            codesign -s - --deep --force "${BUNDLE}" 2>/dev/null || true
          fi

      # Submit the signed app to Apple's notary service and staple the ticket so
      # Gatekeeper accepts it with no "unverified developer" dialog, even when
      # quarantined by Homebrew's cask install. The final distributable zip is
      # produced in the next step from this stapled bundle.
      - name: Notarize SecondBrain.app
        if: steps.codesign_setup.outputs.signed == 'true'
        env:
          ASC_KEY_P8_BASE64: ${{ secrets.ASC_NOTARY_KEY_P8_BASE64 }}
          ASC_KEY_ID: ${{ secrets.ASC_NOTARY_KEY_ID }}
          ASC_ISSUER_ID: ${{ secrets.ASC_NOTARY_ISSUER_ID }}
        run: |
          BUNDLE="app/.build/arm64-apple-macosx/release/SecondBrain.app"
          KEY_PATH="$RUNNER_TEMP/notary.p8"
          NOTARY_ZIP="$RUNNER_TEMP/SecondBrain-notary.zip"
          echo "${ASC_KEY_P8_BASE64}" | base64 --decode > "${KEY_PATH}"
          ditto -c -k --keepParent "${BUNDLE}" "${NOTARY_ZIP}"
          xcrun notarytool submit "${NOTARY_ZIP}" \
            --key "${KEY_PATH}" --key-id "${ASC_KEY_ID}" --issuer "${ASC_ISSUER_ID}" --wait
          xcrun stapler staple "${BUNDLE}"
          xcrun stapler validate "${BUNDLE}"
          rm -f "${KEY_PATH}" "${NOTARY_ZIP}"

      - name: Package and upload SecondBrain.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          BUNDLE="app/.build/arm64-apple-macosx/release/SecondBrain.app"
          ZIP_NAME="SecondBrain-${VERSION}-arm64.zip"

          # ditto preserves macOS bundle metadata and extended attributes
          ditto -c -k --keepParent "${BUNDLE}" "${ZIP_NAME}"

          # Capture SHA256 for cask template
          SHA256=$(shasum -a 256 "${ZIP_NAME}" | awk '{print $1}')
          echo "APP_SHA256=${SHA256}" >> $GITHUB_ENV

          # Attach to the GitHub Release that GoReleaser created
          gh release upload "v${VERSION}" "${ZIP_NAME}"

      # Delete the signing keychain BEFORE the Node/npm steps below. The
      # Developer ID private key is only needed through signing + notarization
      # (both done above); leaving it in the search list would let the
      # subsequent `npm ci` (untrusted dependency install scripts) sign with or
      # export it. `if: always()` so the key is dropped even if an earlier step
      # failed; runs before "Set up Node" so the window is fully closed.
      - name: Remove signing keychain
        if: always() && steps.codesign_setup.outputs.signed == 'true'
        run: |
          security delete-keychain "${{ steps.codesign_setup.outputs.keychain }}" 2>/dev/null || true
          security list-keychains -d user -s login.keychain-db 2>/dev/null || true

      # --- Obsidian plugin (BRAT-installable, no local npm build required) ---
      # Runs AFTER GoReleaser, which owns and creates the GitHub release in its
      # `release:` block. Steps within a job are sequential, so the release
      # `v${VERSION}` already exists by the time we upload here — same proven
      # pattern as the SecondBrain.zip step above. No race with GoReleaser.
      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Build Obsidian plugin
        run: |
          cd plugins/obsidian-2ndbrain
          # legacy-peer-deps is set in .npmrc; package-lock.json is committed.
          npm ci
          # Produces the 3 distributable files: manifest.json, main.js, styles.css
          npm run build

          # Keep versions.json (BRAT/Obsidian compatibility map) in sync with the
          # manifest at release time: merge the current plugin version ->
          # minAppVersion into any committed history so the release asset always
          # reflects what is actually shipping, even if the committed copy lagged.
          node -e "const m=require('./manifest.json');const fs=require('fs');let v={};try{v=require('./versions.json')}catch(e){}v[m.version]=m.minAppVersion;fs.writeFileSync('versions.json', JSON.stringify(v,null,2)+'\n')"

          # Confirm the asset paths the upload step references actually exist.
          ls -l manifest.json main.js styles.css versions.json

      - name: Upload Obsidian plugin assets to release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Run from the workspace root with explicit paths so `gh`'s repo
          # auto-detection is unambiguous. --clobber makes re-runs idempotent
          # (overwrites assets if a previous attempt already uploaded them).
          gh release upload "v${VERSION}" \
            plugins/obsidian-2ndbrain/manifest.json \
            plugins/obsidian-2ndbrain/main.js \
            plugins/obsidian-2ndbrain/styles.css \
            plugins/obsidian-2ndbrain/versions.json \
            --clobber

      - name: Update Homebrew tap
        env:
          HOMEBREW_TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
        run: |
          git clone https://x-access-token:${HOMEBREW_TAP_TOKEN}@github.com/apresai/homebrew-tap.git /tmp/homebrew-tap
          cd /tmp/homebrew-tap

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          # Add 2nb alias for twonb formula (first release only)
          if [ -f twonb.rb ] && [ ! -L Aliases/2nb ]; then
            mkdir -p Aliases
            ln -s ../twonb.rb Aliases/2nb
            git add Aliases/2nb
          fi

          # Generate cask from template
          mkdir -p Casks
          sed \
            -e "s/CASK_VERSION/${VERSION}/g" \
            -e "s/CASK_SHA256/${APP_SHA256}/g" \
            "$GITHUB_WORKSPACE/casks/secondbrain.rb.tmpl" \
            > Casks/secondbrain.rb
          git add Casks/secondbrain.rb

          # Commit and push if there are staged changes
          if ! git diff --cached --quiet; then
            git commit -m "Release v${VERSION}: update formula + cask"
            git push
          fi
