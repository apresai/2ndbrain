name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: macos-latest  # CGO (SQLite) + Swift require macOS toolchain
    environment: apresai    # Access HOMEBREW_TAP_TOKEN from this environment
    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          # Read the Go version from cli/go.mod so the workflow can't drift from
          # what the module requires. setup-go v6 sets GOTOOLCHAIN=local, so the
          # installed toolchain must already satisfy go.mod (no auto-download) —
          # a hardcoded older go-version would fail the build.
          go-version-file: cli/go.mod
          # go.sum lives in cli/, not the repo root; point the built-in module
          # cache at it so setup-go stops warning "Restore cache failed".
          cache-dependency-path: cli/go.sum

      - name: Read version
        run: |
          VERSION=$(cat VERSION | tr -d '\n')
          echo "VERSION=${VERSION}" >> $GITHUB_ENV

      # The 2nb skill is embedded into the CLI from
      # cli/internal/skills/content/2ndbrain-skill.md and mirrored to the
      # repo-root discovery paths (.agents/.warp/.claude). Fail the release if a
      # mirror has drifted from that source, rather than shipping a stale skill.
      # Fix locally with `make sync-skills`. (Same shape as the plugin-manifest
      # gate below.)
      - name: Verify skill mirrors match the embedded source
        run: make check-skills-sync

      - name: Run GoReleaser
        uses: goreleaser/goreleaser-action@v7
        with:
          distribution: goreleaser
          # Pin to the GoReleaser v2 line (our .goreleaser.yaml is `version: 2`);
          # `latest` warned it would lock to `~> v2` anyway.
          version: "~> v2"
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          HOMEBREW_TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}

      # NOTE: The macOS app is NOT built here. It is Developer ID-signed and
      # Apple-notarized on the maintainer's machine (signing keys never leave it
      # / never enter CI), then published with `make release-app` AFTER this
      # workflow creates the release. See `scripts/release-app-local.sh` and the
      # "Release" section of CLAUDE.md. CI here ships only the CLI (GoReleaser)
      # and the Obsidian plugin; the cask is updated by `make release-app`, not
      # this job.

      # --- Obsidian plugin (BRAT-installable, no local npm build required) ---
      # Runs AFTER GoReleaser, which owns and creates the GitHub release in its
      # `release:` block. Steps within a job are sequential, so the release
      # `v${VERSION}` already exists by the time we upload here, so there is no
      # race with GoReleaser.
      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: '24'

      # From 0.8.0 every product releases at the VERSION file's version.
      # `make bump-*` / `make set-version` sync the plugin manifest; this
      # guard fails the release on any drift instead of silently shipping a
      # plugin whose version disagrees with the CLI/app/cask.
      - name: Verify plugin version matches VERSION
        run: |
          MANIFEST_VERSION=$(node -p "require('./plugins/obsidian-2ndbrain/manifest.json').version")
          if [ "${MANIFEST_VERSION}" != "${VERSION}" ]; then
            echo "::error::Plugin manifest version (${MANIFEST_VERSION}) != VERSION (${VERSION}). Run 'make version-plugin' and re-tag."
            exit 1
          fi
          echo "Plugin version ${MANIFEST_VERSION} matches VERSION."

      - name: Build Obsidian plugin
        run: |
          cd plugins/obsidian-2ndbrain
          # legacy-peer-deps is set in .npmrc; package-lock.json is committed.
          npm ci
          # Produces the 3 distributable files: manifest.json, main.js, styles.css
          npm run build

          # Keep versions.json (BRAT/Obsidian compatibility map) in sync with the
          # manifest at release time: merge the current plugin version ->
          # minAppVersion into any committed history so the release asset always
          # reflects what is actually shipping, even if the committed copy lagged.
          node -e "const m=require('./manifest.json');const fs=require('fs');let v={};try{v=require('./versions.json')}catch(e){}v[m.version]=m.minAppVersion;fs.writeFileSync('versions.json', JSON.stringify(v,null,2)+'\n')"

          # Confirm the asset paths the upload step references actually exist.
          ls -l manifest.json main.js styles.css versions.json

      - name: Upload Obsidian plugin assets to release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Run from the workspace root with explicit paths so `gh`'s repo
          # auto-detection is unambiguous. --clobber makes re-runs idempotent
          # (overwrites assets if a previous attempt already uploaded them).
          gh release upload "v${VERSION}" \
            plugins/obsidian-2ndbrain/manifest.json \
            plugins/obsidian-2ndbrain/main.js \
            plugins/obsidian-2ndbrain/styles.css \
            plugins/obsidian-2ndbrain/versions.json \
            --clobber

      # Maintains only the `2nb` alias for the twonb formula. The formula itself
      # is pushed by GoReleaser above; the cask is updated out-of-band by
      # `make release-app` (which has the notarized DMG's sha256), so it is NOT
      # touched here.
      - name: Update Homebrew tap (formula alias)
        env:
          HOMEBREW_TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
        run: |
          git clone https://x-access-token:${HOMEBREW_TAP_TOKEN}@github.com/apresai/homebrew-tap.git /tmp/homebrew-tap
          cd /tmp/homebrew-tap

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          # Add 2nb alias for twonb formula (first release only)
          if [ -f twonb.rb ] && [ ! -L Aliases/2nb ]; then
            mkdir -p Aliases
            ln -s ../twonb.rb Aliases/2nb
            git add Aliases/2nb
          fi

          # Commit and push if the alias was just created (no-op on later releases)
          if ! git diff --cached --quiet; then
            git commit -m "Add 2nb alias for twonb formula"
            git push
          fi
